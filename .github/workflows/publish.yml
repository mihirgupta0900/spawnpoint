name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        if: github.event_name == 'workflow_dispatch'
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1 | sed 's/^v//')
          if [ -z "$LATEST" ]; then LATEST="0.0.0"; fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "next=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST → ${MAJOR}.${MINOR}.${PATCH}"

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "v${{ steps.version.outputs.next }}"
          git push origin "v${{ steps.version.outputs.next }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build
        run: pip install hatch && hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', steps.version.outputs.next) || github.ref_name }}
          generate_release_notes: true
          files: dist/*
